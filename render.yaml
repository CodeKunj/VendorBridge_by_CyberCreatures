services:
  # ─── Backend API (Node.js) ───────────────────────────────────────────────────
  - type: web
    name: vendorbridge-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false          # set in Render dashboard
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-flash-latest
      - key: AI_TEMPERATURE
        value: "0.4"
      - key: AI_MAX_TOKENS
        value: "1024"
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LOG_LEVEL
        value: info

  # ─── Frontend (Vite/React) ───────────────────────────────────────────────────
  - type: web
    name: vendorbridge-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to https://vendorbridge-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
